<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>Code Canery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="page">

  <!-- ── Header ─────────────────────────────── -->
  <header class="header">
    <span class="app-title">Code Canery</span>
    <a href="/history" class="history-btn" aria-label="Verlauf anzeigen" title="Verlauf">
      <!-- history / clock icon -->
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
        <path d="M3.05 11a9 9 0 1 1 .5 4"/>
      </svg>
    </a>
  </header>

  <!-- ── Centre: animated soundwave ──────────── -->
  <main class="center" aria-label="Soundwave-Visualisierung">
    <div class="soundwave idle" id="soundwave" aria-hidden="true">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </main>

  <!-- ── Bottom action card ───────────────────── -->
  <section class="bottom-card" aria-label="Aktionen">

    <!-- Record / Stop button -->
    <button
      class="record-btn"
      id="record-btn"
      aria-label="Aufnahme starten"
      type="button"
    >
      <span class="record-dot" aria-hidden="true"></span>
      <span id="record-label">Aufnehmen</span>
    </button>

    <!-- Upload button -->
    <button class="upload-btn" id="upload-btn" aria-label="Audiodatei hochladen" type="button">
      <!-- upload / arrow-up-from-tray icon -->
      <svg class="icon icon-sm" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Hochladen
    </button>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="audio/*,video/*" tabindex="-1" />
  </section>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true"></div>

</div>

<script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
