<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>Ergebnis #{{ result.id }} – Code Canery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="page" style="overflow-y: auto;">
  <div class="result-page">
    <a href="/" class="back-btn" aria-label="Zurück zur Startseite">
      <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Zurück
    </a>
    <h1>Auswertung {{ result.get_formatted_date() }}</h1>
    <div class="score-card">
      <span class="score-label">Dein Score</span>
      <span class="score-value {{ result.get_score_css_class() }}">{{ result.score }}</span>
      <span class="score-unit">von 100 Punkten</span>
      <div class="details-expander">
        <div onclick="toggleDetails();">
          <svg id="details-flip" class="flip" xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"><path d="M24 22h-24l12-20z"/></svg>
          Details
        </div>
        <div id="details-content" style="visibility: hidden;display: none;">
          <table>
            <tbody>
              <tr>
                <td class="details-label">Merkmal 1:</td>
                <td class="details-value">0/10</td>
              </tr>
              <tr>
                <td class="details-label">Merkmal 2:</td>
                <td class="details-value">0/10</td>
              </tr>
              <tr>
                <td class="details-label">Merkmal 3:</td>
                <td class="details-value">0/10</td>
              </tr>
              <tr>
                <td class="details-label">Merkmal 4:</td>
                <td class="details-value">0/10</td>
              </tr>
              <tr>
                <td class="details-label">Merkmal 5:</td>
                <td class="details-value">0/10</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/result.js') }}"></script>
</body>
</html>
