<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>Ergebnis #{{ result.id }} – Code Canery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .result-page { padding: 20px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); font-size: 0.95rem; font-weight: 500;
      text-decoration: none; margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .result-page h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 32px; }
    .score-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 40px 24px;
      text-align: center;
    }
    .score-label {
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .score-value {
      font-size: 5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .score-unit {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }
    .score-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="page" style="overflow-y: auto;">
  <div class="result-page">
    <a href="/" class="back-btn" aria-label="Zurück zur Startseite">
      <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Zurück
    </a>
    <h1>Ergebnis #{{ result.id }}</h1>
    <div class="score-card">
      <span class="score-label">Dein Score</span>
      <span class="score-value">{{ result.score }}</span>
      <span class="score-unit">von 100 Punkten</span>
      <span class="score-meta">{{ result.created_at }} UTC</span>
    </div>
  </div>
</div>
</body>
</html>
