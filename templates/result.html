<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Canary - Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        .score {
            font-size: 5rem;
            font-weight: bold;
            color: #4a90e2;
            margin: 1rem 0;
        }
        .filename {
            color: #666;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
        }
        a:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Code Canary</h1>
        <p class="filename">File: <strong>{{ filename }}</strong></p>
        <div class="score">{{ score }}</div>
        <p>Quality Score</p>
        <a href="/">Upload another file</a>
    </div>
</body>
</html>
